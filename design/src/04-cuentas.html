<!-- @dsCard name="Cuentas" group="Componentes" subtitle="Saldos, TAE y total patrimonio" -->
<div class="card">
  <div class="row">
    <div class="card-title grow">Cuentas</div>
    <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px">+ Añadir</button>
  </div>
  <div class="accounts">
    <div class="account">
      <div class="chip" style="--c:#2a78d6">🏦</div>
      <div class="grow"><div class="name">Banco</div><div class="bal num">4.332,05 €</div></div>
    </div>
    <div class="account">
      <div class="chip" style="--c:#1baf7a">💳</div>
      <div class="grow">
        <div class="row" style="gap:6px"><span class="name">Cuenta remunerada</span><span class="badge">1,15% TAE</span></div>
        <div class="bal num">555,33 €</div>
        <div class="apy num">+0,02 € interés</div>
      </div>
    </div>
    <div class="account">
      <div class="chip" style="--c:#eda100">💵</div>
      <div class="grow"><div class="name">Efectivo</div><div class="bal num">5,00 €</div></div>
    </div>
    <div class="account">
      <div class="chip" style="--c:#008300">📈</div>
      <div class="grow"><div class="name">Inversiones</div><div class="bal num">208,45 €</div></div>
    </div>
    <div class="account total" style="grid-column:span 2">
      <div class="chip" style="--c:#4a3aa7">Σ</div>
      <div class="grow"><div class="name">Total patrimonio</div><div class="bal num" style="font-size:18px">5.100,83 €</div></div>
    </div>
  </div>
</div>
