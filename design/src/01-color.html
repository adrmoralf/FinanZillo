<!-- @dsCard name="Color" group="Fundamentos" subtitle="Superficies, tinta, semánticos y paleta de gráficas (validada)" -->
<div class="card">
  <div class="card-title">Superficies y tinta</div>
  <div class="swatches">
    <div class="sw"><div class="c" style="background:var(--page)"></div><div class="n">Fondo</div><div class="h">--page</div></div>
    <div class="sw"><div class="c" style="background:var(--surface)"></div><div class="n">Tarjeta</div><div class="h">--surface</div></div>
    <div class="sw"><div class="c" style="background:var(--surface-2)"></div><div class="n">Hundido</div><div class="h">--surface-2</div></div>
    <div class="sw"><div class="c" style="background:var(--ink)"></div><div class="n">Tinta</div><div class="h">--ink</div></div>
  </div>
</div>
<div class="card">
  <div class="card-title">Semánticos</div>
  <div class="swatches">
    <div class="sw"><div class="c" style="background:var(--accent)"></div><div class="n">Acento / Ingresos</div><div class="h">--accent</div></div>
    <div class="sw"><div class="c" style="background:var(--gasto)"></div><div class="n">Gastos</div><div class="h">--gasto</div></div>
    <div class="sw"><div class="c" style="background:var(--positive)"></div><div class="n">Positivo</div><div class="h">--positive</div></div>
    <div class="sw"><div class="c" style="background:#fab219"></div><div class="n">Aviso</div><div class="h">warning</div></div>
  </div>
</div>
<div class="card">
  <div class="card-title">Paleta de gráficas y categorías (8 tonos validados CVD — no cambia)</div>
  <div class="swatches" style="grid-template-columns:repeat(8,1fr)">
    <div class="sw"><div class="c" style="background:#2a78d6"></div></div>
    <div class="sw"><div class="c" style="background:#1baf7a"></div></div>
    <div class="sw"><div class="c" style="background:#eda100"></div></div>
    <div class="sw"><div class="c" style="background:#008300"></div></div>
    <div class="sw"><div class="c" style="background:#4a3aa7"></div></div>
    <div class="sw"><div class="c" style="background:#e34948"></div></div>
    <div class="sw"><div class="c" style="background:#e87ba4"></div></div>
    <div class="sw"><div class="c" style="background:#eb6834"></div></div>
  </div>
</div>
