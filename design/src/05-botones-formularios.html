<!-- @dsCard name="Botones y formularios" group="Componentes" subtitle="Acciones, selector de tipo, inputs y navegación" -->
<div class="card">
  <div class="card-title">Botones</div>
  <div class="row" style="flex-wrap:wrap">
    <button class="btn btn-primary">Guardar</button>
    <button class="btn">Cancelar</button>
    <button class="btn btn-danger">Eliminar</button>
    <button class="btn btn-ghost">+ Añadir</button>
    <div class="fab">+</div>
  </div>
</div>
<div class="card">
  <div class="card-title">Selector de tipo (modal de movimiento)</div>
  <div class="seg">
    <div class="opt on-gasto">Gasto</div>
    <div class="opt">Ingreso</div>
    <div class="opt">Transf.</div>
  </div>
  <input class="input num" value="12,50" aria-label="Importe">
  <input class="input" placeholder="Nota (opcional)">
</div>
<div class="card">
  <div class="card-title">Navegación</div>
  <div class="topbar">
    <div class="brand">💶 FinanZillo</div>
    <div class="tabs grow">
      <div class="tab active">Resumen</div>
      <div class="tab">Movimientos</div>
      <div class="tab">Inversiones</div>
      <div class="tab">Recurrentes</div>
    </div>
  </div>
</div>
